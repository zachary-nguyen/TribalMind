name: Bump version

# Manually trigger from the GitHub Actions UI
# Actions → Bump version → Run workflow → pick patch/minor/major
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch   # 0.1.0 → 0.1.1  (bug fixes)
          - minor   # 0.1.0 → 0.2.0  (new features)
          - major   # 0.1.0 → 1.0.0  (breaking changes)

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pip install hatch

      - name: Bump version
        id: bump
        run: |
          hatch version ${{ inputs.bump }}
          NEW_VERSION=$(hatch version)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin master "v${{ steps.bump.outputs.version }}"
        # Pushing the tag triggers release.yml automatically
