name: Release

on:
  push:
    branches: [master]

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version, build & publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # push version bump commit + tag
      id-token: write   # PyPI trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # PSR needs full history to read all commits

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install python-semantic-release hatch

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Check if any commits since last tag warrant a release.
      # Outputs next version (e.g. "0.2.0") or empty string if nothing to release.
      - name: Determine next version
        id: next
        run: |
          NEXT=$(semantic-release version --print 2>/dev/null || echo "")
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: ${NEXT:-'(none — skipping release)'}"

      # Update pyproject.toml + CHANGELOG.md but don't commit/tag yet
      - name: Bump version files
        if: steps.next.outputs.version != ''
        run: semantic-release version --no-commit --no-tag --no-push --no-vcs-release

      - name: Build frontend
        if: steps.next.outputs.version != ''
        working-directory: ui
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Build wheel + sdist
        if: steps.next.outputs.version != ''
        # hatch_build.py bundled the frontend into the wheel at this point
        run: hatch build

      - name: Publish to PyPI
        if: steps.next.outputs.version != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      # Commit, tag, and push — after a successful publish
      - name: Commit and tag release
        if: steps.next.outputs.version != ''
        run: |
          git add pyproject.toml
          [ -f CHANGELOG.md ] && git add CHANGELOG.md || true
          if git diff --cached --quiet; then
            echo "No version file changes to commit (already committed?). Skipping commit/tag/push."
            exit 0
          fi
          git commit -m "chore: release v${{ steps.next.outputs.version }} [skip ci]"
          git tag "v${{ steps.next.outputs.version }}"
          git push origin master "v${{ steps.next.outputs.version }}"

      - name: Create GitHub release
        if: steps.next.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.next.outputs.version }}
          files: dist/*
          generate_release_notes: true
